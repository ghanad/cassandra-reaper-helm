{{- if and .Values.admin.enabled .Values.admin.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cassandra-reaper.fullname" . }}-admin
  labels:
    {{- include "cassandra-reaper.labels" . | nindent 4 }}
    {{- with .Values.admin.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.admin.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.admin.service.type }}
  selector:
    {{- include "cassandra-reaper.selectorLabels" . | nindent 4 }}
  ports:
    - name: admin
      port: {{ .Values.admin.port }}
      targetPort: admin
      protocol: TCP
{{- end }}
