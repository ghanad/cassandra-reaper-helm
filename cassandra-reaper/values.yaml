nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: thelastpickle/cassandra-reaper
  tag: 4.0.1
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

deploymentAnnotations: {}

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  labels: {}
  hosts:
    - host: reaper.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

reaper:
  storageType: cassandra
  auth:
    enabled: true
    username: change-me-admin
    password: change-me-admin-password
    jwtSecret: ""
    readOnly:
      username: ""
      password: ""
  cassandra:
    clusterName: change-me-cassandra-cluster
    contactPoints:
      - host: cassandra.default.svc.cluster.local
        port: 9042
    keyspace: reaper_db
    localDc: change-me-dc
    auth:
      enabled: true
      username: change-me-cassandra-user
      password: change-me-cassandra-password

probes:
  readiness:
    path: /ping
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  liveness:
    path: /ping
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  startup:
    path: /ping
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

admin:
  enabled: false
  port: 8081
  service:
    enabled: false
    type: ClusterIP
    annotations: {}
    labels: {}

extraEnv: {}
extraSecretEnv: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext: {}
securityContext: {}

extraLabels: {}
extraAnnotations: {}
